<!DOCTYPE html>
<html>
<head>
  <title>NaijaJobConnect - Apply & Post Jobs</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }

    header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .job-card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .job-title {
      font-size: 20px;
      font-weight: bold;
    }

    .apply-btn {
      background: #007bff;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
      display: inline-block;
      margin-top: 10px;
    }

    .apply-btn:hover {
      background: #0056b3;
    }

    .post-job {
      background: #28a745;
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 5px;
      display: inline-block;
      margin-top: 20px;
    }

    .post-job:hover {
      background: #1e7e34;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #222;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <header>
    <h1>NaijaJobConnect</h1>
    <p>Find jobs easily & post jobs fast</p>
  </header>

  <div class="container">

    <div class="job-card">
      <div class="job-title">Customer Service Officer</div>
      <p>Company: XYZ Ltd</p>
      <a href="https://www.jobberman.com/jobs" class="apply-btn" target="_blank">
        Apply on Jobberman
      </a>
    </div>

    <div class="job-card">
      <div class="job-title">Graphic Designer (Remote)</div>
      <p>Company: ABC Digital</p>
      <a href="https://www.indeed.com/q-nigeria-jobs.html" class="apply-btn" target="_blank">
        Apply on Indeed
      </a>
    </div>

    <a href="https://paystack.com/pay/yourpaymentlink" class="post-job" target="_blank">
      Post a Job – ₦5,000
    </a>

  </div>

  <footer>
    <p>© 2026 NaijaJobConnect | Built by You 💪</p>
  </footer>

</body>
</html>
